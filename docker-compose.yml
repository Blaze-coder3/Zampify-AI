version: "3.9"

services:
  # Redis — Task Queue Broker (ARQ)
  redis:
    image: redis:7-alpine
    container_name: zampify_redis
    ports:
      - "6380:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # PostgreSQL 18 — Primary Database
  postgres:
    image: postgres:16-alpine
    container_name: zampify_postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: zampify
      POSTGRES_PASSWORD: zampify
      POSTGRES_DB: zampify
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zampify"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  redis_data:
  pgdata:
