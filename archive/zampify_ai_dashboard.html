        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc; /* slate-50 */
            margin: 0;
            padding: 0;
            overflow: hidden; /* Prevent body scroll, handle internally */
        }
        
        /* Utility class for document highlight boxes */
        .doc-highlight {
            position: absolute;
            border: 2px solid;
            background-color: rgba(0, 255, 0, 0.1);
            border-radius: 2px;
            cursor: pointer;
        }
        .doc-highlight.green { border-color: #22c55e; background-color: rgba(34, 197, 94, 0.1); }
        .doc-highlight.blue { border-color: #3b82f6; background-color: rgba(59, 130, 246, 0.1); }
        
        /* Progress ring for story points */
        .progress-ring__circle {
            transition: stroke-dashoffset 0.35s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
    </style>
    <!-- Load Inter font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

                            />
                            
                            {/* Slide-over panel for details */}
                            <div className={`transition-all duration-300 ease-in-out h-full ${selectedInvoice ? 'w-[75%]' : 'w-0 opacity-0'} flex overflow-hidden shadow-2xl z-20`}>
                                 <InvoiceDetailView invoice={selectedInvoice} />
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
