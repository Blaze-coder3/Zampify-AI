services:
  - type: web
    name: zampify-backend
    env: python
    rootDir: backend
    buildCommand: uv pip install -r requirements.txt || pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: postgresql+asyncpg://zampify_user:cxoPX4ME0owxdAAuXRvu88Yt1ury6RFM@dpg-d9elnvbrjlhs73cm5010-a.oregon-postgres.render.com/zampify
      - key: DATABASE_SYNC_URL
        value: postgresql://zampify_user:cxoPX4ME0owxdAAuXRvu88Yt1ury6RFM@dpg-d9elnvbrjlhs73cm5010-a.oregon-postgres.render.com/zampify
      - key: REDIS_URL
        fromService:
          type: redis
          name: zampify-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FEATHERLESS_API_KEY
        sync: false
      - key: FEATHERLESS_BASE_URL
        value: https://api.featherless.ai/v1
      - key: FEATHERLESS_MODEL
        value: Qwen/Qwen2.5-72B-Instruct
      - key: MAX_UPLOAD_SIZE_MB
        value: 10
      - key: POLICY_FILE
        value: ./app/policies/policies.yaml
      - key: IMAP_USERNAME
        sync: false
      - key: IMAP_PASSWORD
        sync: false
      - key: IMAP_SERVER
        value: imap.gmail.com

  - type: redis
    name: zampify-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []
